{% extends 'layouts/base_auth.html' %}
{% load static %}

{% block title %}404 — Nie znaleziono{% endblock %}

{% block content %}
<div style="text-align:center; max-width:480px;">
  <div style="font-size:6rem; font-weight:900; color:var(--primary); line-height:1; margin-bottom:var(--space-4);">404</div>
  <h1 style="font-size:1.5rem; font-weight:700; margin-bottom:var(--space-3);">Nie znaleziono strony</h1>
  <p style="color:var(--text-muted); margin-bottom:var(--space-6);">Przepraszamy, strona, której szukasz, nie mogła zostać znaleziona.</p>
  <a href="{% url 'dashboard' %}" class="btn btn-primary">Wróć do strony głównej</a>
</div>
{% endblock %}
