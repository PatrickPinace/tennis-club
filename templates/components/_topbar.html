<header class="app-topbar">
  <div class="app-topbar__left">
    <!-- Mobile hamburger -->
    <button class="btn btn-ghost btn-icon" id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Menu" style="display:none;">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
      </svg>
    </button>
    <span class="topbar-page-title">{% block topbar_title %}Tennis Club{% endblock %}</span>
  </div>

  <div class="app-topbar__right">
    <!-- Notifications -->
    <a href="#" class="notif-btn" title="Powiadomienia" id="notif-btn">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
        <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/>
      </svg>
      <span class="notif-btn__dot" id="notif-count" style="display:none;">0</span>
    </a>

    <!-- User -->
    <a href="{% url 'users_edit' %}" class="user-chip">
      <div class="user-chip__avatar">
        {{ request.user.first_name|default:request.user.username|slice:":1"|upper }}
      </div>
      <span class="user-chip__name">{{ request.user.first_name|default:request.user.username }}</span>
    </a>
  </div>
</header>
