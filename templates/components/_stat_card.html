<div class="stat-card">
  <div class="stat-card__header">
    <span class="stat-card__label">{{ label }}</span>
    {% if icon %}
    <div class="stat-card__icon">{{ icon }}</div>
    {% endif %}
  </div>
  <div class="stat-card__value">{{ value|default:"—" }}</div>
  {% if detail %}
  <div class="stat-card__detail">{{ detail }}</div>
  {% endif %}
</div>
