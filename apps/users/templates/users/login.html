{% extends 'tennis-club.html' %}
{% load socialaccount %}

{% block styles %}
<link rel="stylesheet" href="/static/css/users.css">
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="users login card mx-auto">
        <div class="card-header">
            <h2 class="mb-0 text-white text-center font-2">Logowanie</h2>
        </div>
        <div class="card-body">
            <form method="post" id="login-form">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="login" class="form-label">Login lub e-mail</label>
                    <input type="text" class="form-control" id="login" name="login" required value="{{ login_name_value|default_if_none:'' }}">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Hasło</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-success w-100" id="login-button">Zaloguj się</button>
                <!-- Google OAuth temporarily disabled
                <div class="d-flex align-items-center my-3">
                    <hr class="flex-grow-1">
                    <span class="px-2 text-muted">lub</span>
                    <hr class="flex-grow-1">
                </div>
                <a href="{% provider_login_url 'google' %}" class="btn btn-outline-primary w-100 d-flex align-items-center justify-content-center">
                    <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google logo" style="height: 20px; margin-right: 10px;">
                    Zaloguj się z Google
                </a>
                -->
            </form>
            <div class="mt-3 text-center">
                <a href="{% url 'register' %}">Nie masz konta? Zarejestruj się</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
        const button = document.getElementById('login-button');
        button.disabled = true;
        button.innerHTML = `
            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            Logowanie...
        `;

        // Fallback na wypadek problemów z siecią lub brakiem odpowiedzi serwera
        setTimeout(function() {
            if (button.disabled) {
                button.disabled = false;
                button.innerHTML = 'Zaloguj się';
            }
        }, 10000);
    });
</script>

{% providers_media_js %}
{% endblock %}
