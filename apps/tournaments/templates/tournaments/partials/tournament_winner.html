{% if tournament.status == 'FIN' and tournament.winner %}
<div class="card bg-success text-white text-center my-4 shadow">
    <div class="card-body py-4 py-md-5">
        <h1 class="display-6 display-md-4 text-nowrap"><i class="fa-solid fa-trophy text-warning"></i> Zwycięzca Turnieju</h1>
        <h2 class="mt-3 fw-bold text-nowrap overflow-hidden text-truncate px-2">{{ tournament.winner.display_name }}</h2>
        <p class="lead mt-2">Gratulacje!</p>
    </div>
</div>
{% endif %}
